<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光信箱 - 时间胶囊</title>
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/mailbox.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo-text" onclick="window.location.href='index.html'" style="cursor: pointer;">时间胶囊</div>
            <div class="nav-links">
                <a href="write.html">写信</a>
                <a href="capsule.html">时间胶囊</a>
                <a href="mailbox.html" style="color: var(--accent-color); font-weight: bold;">时光信箱</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <div class="subpage-container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h2 class="page-title" style="margin-bottom: 10px;">时光信箱</h2>
            <p style="color: var(--text-muted); letter-spacing: 1px;">在这里，阅读陌生人的故事与期许。</p>
        </header>

        <div class="mailbox-tabs">
            <button class="tab-btn active" data-tab="future">给未来的信</button>
            <button class="tab-btn" data-tab="image">图片信件</button>
            <button class="tab-btn" data-tab="shqs">三行情书</button>
        </div>

        <div id="mailbox-list" class="mailbox-list">
            <!-- Mail items injected by JS -->
        </div>
        
        <div class="loading" style="display: none; text-align: center; color: var(--text-light); margin: 2rem 0;">
            加载中...
        </div>
        <div class="no-more" style="display: none; text-align: center; color: var(--text-light); margin: 2rem 0;">
            没有更多信件了
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="mailModal" class="modal">
        <div class="modal-content paper-texture">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Time Capsule. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/mailbox.js"></script>
</body>
</html>
