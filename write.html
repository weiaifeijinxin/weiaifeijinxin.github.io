<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写信 - 时间胶囊</title>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="styles/write.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo-text" onclick="window.location.href='index.html'" style="cursor: pointer;">时间胶囊</div>
            <div class="nav-links">
                <a href="write.html" style="color: var(--accent-color); font-weight: bold;">写信</a>
                <a href="capsule.html">时间胶囊</a>
                <a href="mailbox.html">时光信箱</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <main class="subpage-main">
        <div class="letter-container" style="position: relative;">
            <!-- 右上角复古邮票 -->
            <img id="decoStampWrite" src="" alt="邮票" style="position: absolute; top: -15px; right: 20px; width: 55px; transform: rotate(8deg); opacity: 0.85; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15)); z-index: 10; pointer-events: none;">
            
            <div class="letter-form">
                <div class="letter-header">
                    <div class="date">写信日期：<span id="currentDate"></span></div>
                </div>
                <textarea 
                    id="letterContent" 
                    placeholder="亲爱的未来...&#10;&#10;写下此刻想说的话，让时光带去未来..."
                    rows="12"
                ></textarea>
                <div class="letter-footer">
                    <button id="apiButton" class="api-button" title="封存信件">
                        <span class="button-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </span>
                    </button>
                </div>
                <div id="apiResult" class="result-area"></div>
            </div>
        </div>

        <!-- 发送弹窗 -->
        <div id="sendModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>确认寄出信件</h3>
                    <button class="close-button">&times;</button>
                </div>
                <div class="form-group">
                    <label for="receiverEmail">收件人邮箱：</label>
                    <input type="email" id="receiverEmail" class="modal-input" required>
                </div>
                <div class="form-group">
                    <label for="receiveDate">收信日期：</label>
                    <input type="date" id="receiveDate" class="modal-input" required>
                </div>
                <div class="form-group inline-flex-form">
                    <label for="isPublic">是否公开：</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="isPublic">
                        <label for="isPublic" class="toggle-label"></label>
                    </div>
                </div>
                <span class="hint">公开的信件将会在「信件墙」展示</span>
                
                <div class="modal-footer">
                    <button class="modal-button cancel">返回修改</button>
                    <button class="modal-button confirm">确认发送</button>
                </div>
            </div>
        </div>

        <!-- 成功提示弹窗 -->
        <div id="successModal" class="modal success-modal">
            <div class="modal-content">
                <div class="success-header">
                    <div class="success-icon" style="color: var(--accent-color); margin-bottom: 15px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                </div>
                <h3 style="color: var(--text-main); margin-bottom: 10px;">寄出成功</h3>
                <p id="successMessage" style="color: var(--text-muted); font-size: 14px; line-height: 1.6;"></p>
                <div class="modal-footer" style="justify-content: center; margin-top: 20px;">
                    <button class="modal-button confirm toggle-close-success" onclick="document.getElementById('successModal').classList.remove('show'); window.location.href='index.html'">返回首页</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/write.js"></script>
</body>
</html>
