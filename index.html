<body>
    <nav class="top-nav">
        <div class="nav-links">
            <a href="write.html">写信</a>

    <main class="home-container">
        <!-- 背景高光装饰 -->
        <div class="bg-glow glow-1"></div>

        <div class="content-center">
            <!-- App 图标 -->
            <div class="app-icon-wrapper">

            <p class="tagline">寄往未来的信，与时间做个约定</p>

            <div class="subtitle">

                <p class="highlight">从前车马很慢，书信很远，一生只够爱一个人</p>
            </div>
            
            <div class="action-group">
                <button class="action-btn primary-btn" onclick="window.location.href='write.html'">
                    <span class="icon">✨</span>
                    在线写信

                <a href="https://apps.apple.com/cn/app/%E6%97%B6%E9%97%B4%E8%83%B6%E5%9B%8A-%E5%AF%84%E5%BE%80%E6%9C%AA%E6%9D%A5%E7%9A%84%E4%BF%A1/id1358237203" target="_blank" class="action-btn apple-btn">
                    <svg class="apple-logo" viewBox="0 0 384 512" width="20" height="20" fill="currentColor">
                        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                    </svg>
                    <div class="btn-text">
                        <span class="small-text">Download on the</span>
                        <span class="large-text">App Store</span>
                    </div>
                </a>
            </div>

            <div class="development-notice">
                <span class="pulse-dot"></span>
                <span>安卓版本正在加速开发中...</span>
            </div>
        </div>

        <!-- 底部数据统计 -->
        <div class="stats-container">
            <div class="stats-wrapper">
                <div class="stat-item">
                    <div class="stat-icon">👀</div>
                    <div class="stat-info">
                        <span class="stat-number" id="visitCount">0</span>
                        <span class="stat-label">历史访客</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon">✉️</div>
                    <div class="stat-info">
                        <span class="stat-number" id="letterCount">0</span>
                        <span class="stat-label">信件封存</span>
                    </div>
                </div>
            </div>
        </div>

    <script src="js/main.js"></script>
