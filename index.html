<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间胶囊 - 寄往未来的信</title>
    <link rel="stylesheet" href="styles/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo-text">时间胶囊</div>
            <div class="nav-links">
                <a href="write.html">写信</a>
                <a href="capsule.html">时间胶囊</a>
                <a href="mailbox.html">时光信箱</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>

    <main class="home-container">
        <!-- 左侧文本与操作区 (Web端靠左，移动端居中) -->
        <div class="hero-content">
            <div class="stamp-wrap">
                <img src="images/timepillicon1024.png" alt="时间胶囊Logo" class="app-icon" onerror="this.src='https://via.placeholder.com/65?text=Stamp'">
            </div>
            
            <h1 class="main-title">时间胶囊</h1>
            <p class="tagline">寄往未来的信</p>
            
            <p class="intro-text">
                在这个步履匆匆的世界里，留一份慢下来的惊喜。<br>
                写下此刻的心声，让时光替你保管这份温暖的期许。
            </p>

            <div class="action-group">
                <a href="write.html" class="action-btn primary-btn">
                    <span class="icon">✒️</span> 起笔写信
                </a>
                <a href="https://apps.apple.com/cn/app/%E6%97%B6%E9%97%B4%E8%83%B6%E5%9B%8A-%E5%AF%84%E5%BE%80%E6%9C%AA%E6%9D%A5%E7%9A%84%E4%BF%A1/id1358237203" target="_blank" class="action-btn app-store-btn">
                    📥  App Store 下载
                </a>
            </div>
            <div class="status-text">安卓版本正在用心开发中...</div>
            
            <div class="stats-footer">
                <div class="stat-item">
                    <span class="stat-icon">🕊️</span>
                    <div>
                        <div class="stat-number" id="visitCount">0</div>
                        <div class="stat-label">信使足迹</div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">✉️</span>
                    <div>
                        <div class="stat-number" id="letterCount">0</div>
                        <div class="stat-label">信件封存</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧视觉区：高度还原的信纸 (Web端靠右，移动端靠下) -->
        <div class="hero-visual">
            <div class="letter-paper">
                <div class="tape"></div>
                <div class="poetry">
                    <p>清早上火车站</p>
                    <p>长街黑暗无行人</p>
                    <p>卖豆浆的小店冒着热气</p>
                    <br>
                    <p class="highlight">从前车马很慢，书信很远</p>
                    <p class="highlight">一生只够爱一个人</p>
                </div>
                <div class="signature">— 《从前慢》</div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
