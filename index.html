<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo-text">时间胶囊</div>

    <main class="home-container">
        <!-- 左侧文本与操作区 (Web端靠左，移动端居中) -->
        <div class="hero-content">
            <div class="stamp-wrap">
                <img src="images/timepillicon1024.png" alt="时间胶囊Logo" class="app-icon" onerror="this.src='https://via.placeholder.com/65?text=Stamp'">
            </div>
            
            <h1 class="main-title">时间胶囊</h1>
            <p class="tagline">寄往未来的信</p>
            
            <p class="intro-text">
                在这个步履匆匆的世界里，留一份慢下来的惊喜。<br>
                写下此刻的心声，让时光替你保管这份温暖的期许。
            </p>

            <div class="action-group">
                <a href="write.html" class="action-btn primary-btn">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                    </svg>
                    起笔写信
                </a>
                <a href="https://apps.apple.com/cn/app/%E6%97%B6%E9%97%B4%E8%83%B6%E5%9B%8A-%E5%AF%84%E5%BE%80%E6%9C%AA%E6%9D%A5%E7%9A%84%E4%BF%A1/id1358237203" target="_blank" class="action-btn app-store-btn">

                    </svg>
                    App Store 下载
                </a>
            </div>
            <div class="status-text">安卓版本正在用心开发中...</div>
            
            <div class="stats-footer">
                <div class="stat-item">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                    <div>
                        <div class="stat-number" id="visitCount">0</div>
                        <div class="stat-label">信使足迹</div>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

                        <div class="stat-number" id="letterCount">0</div>
                        <div class="stat-label">信件封存</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧视觉区：高度还原的信纸 (Web端靠右，移动端靠下) -->
        <div class="hero-visual">
            <div class="letter-paper">
                <div class="tape"></div>
                <div class="poetry">
                    <p>清早上火车站</p>
                    <p>长街黑暗无行人</p>
                    <p>卖豆浆的小店冒着热气</p>
                    <br>
                    <p class="highlight">从前车马很慢，书信很远</p>
                    <p class="highlight">一生只够爱一个人</p>
                </div>
                <div class="signature">— 《从前慢》</div>
            </div>
        </div>
